<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Portfolio Sample</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="stylesheet" href="style.css">
</head>
<body id="admin-body" style="background-color: var(--accent-2);">
<div class="portfolio-ribbon">PORTFOLIO SAMPLE</div>
<div id="toast-container"></div>

<div id="admin-login-wrap">
    <div class="auth-wrapper">
        <div class="auth-form brutal-box">
            <h1 style="margin-bottom: 2rem; text-align: center;">ADMIN<br>ACCESS</h1>
            <div id="login-error" style="display:none; background: var(--text-color); color: var(--accent-2); padding: 1rem; border: var(--border-width) solid var(--border-color); font-weight: bold; margin-bottom: 2rem; text-align: center;"></div>
            <form id="admin-login-form">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" class="form-input" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-input" required autocomplete="current-password">
                </div>
                <button type="submit" class="btn" style="width: 100%;">LOGIN</button>
            </form>
            <div style="margin-top: 2rem; text-align: center;">
                <a href="index.html" style="color: var(--text-color); font-weight: bold;">&larr; BACK TO SITE</a>
            </div>
            <p style="margin-top:1.5rem;font-size:0.75rem;color:#666;text-align:center;">Static demo: credentials <strong>user</strong> / <strong>user</strong>. Products save in this browser only (localStorage).</p>
        </div>
    </div>
</div>

<div id="admin-dash-wrap" style="display:none;">
    <header style="background: var(--text-color); color: #fff;">
        <div class="nav-container">
            <div class="logo" style="background: #fff; color: var(--text-color); font-weight:900; padding:0.3rem 0.8rem; border:var(--border-width) solid var(--border-color);">PORTFOLIO SYS</div>
            <nav>
                <ul>
                    <li><a href="index.html" style="color: #fff;">LIVE SITE</a></li>
                    <li><a href="#" id="admin-logout" style="color: var(--accent-2);">LOGOUT</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="admin-dashboard">
        <div class="admin-header">
            <h2>DASHBOARD</h2>
            <div>
                <button type="button" class="btn btn-secondary" id="admin-diagnostics">SYSTEM DIAGNOSTICS</button>
            </div>
        </div>

        <div class="dashboard-grid">
            <div class="brutal-box" style="padding: 2rem;">
                <h3>ADD PRODUCT</h3>
                <form id="add-product-form" style="margin-top: 1.5rem;">
                    <div class="form-group">
                        <label>Title</label>
                        <input type="text" id="new-title" class="form-input" placeholder="Product Name" required>
                    </div>
                    <div class="form-group">
                        <label>Price</label>
                        <input type="number" id="new-price" class="form-input" placeholder="45.00" step="0.01" required>
                    </div>
                    <div class="form-group">
                        <label>Description</label>
                        <input type="text" id="new-desc" class="form-input" placeholder="Short description" required>
                    </div>
                    <div class="form-group">
                        <label>Product Image</label>
                        <input type="file" id="new-image" class="form-input" accept="image/*" required>
                    </div>
                    <button type="submit" class="btn">SAVE PRODUCT</button>
                </form>
            </div>

            <div class="brutal-box" style="padding: 2rem; background-color: var(--accent-1);">
                <h3>MANAGE PRODUCTS</h3>
                <div id="admin-product-list" style="margin-top: 1.5rem; max-height: 400px; overflow-y: auto;"></div>
            </div>

            <div class="brutal-box" style="padding: 2rem; background-color: var(--accent-3);">
                <h3>DISCOUNT CODES</h3>
                <form style="margin-top: 1.5rem;" id="discount-form">
                    <div class="form-group">
                        <label>Code Name</label>
                        <input type="text" class="form-input" placeholder="e.g., DROP20">
                    </div>
                    <div class="form-group">
                        <label>Discount %</label>
                        <input type="number" class="form-input" placeholder="20">
                    </div>
                    <button type="submit" class="btn btn-secondary">GENERATE</button>
                </form>
            </div>
        </div>
    </main>

    <footer style="margin-top: auto;">
        <div class="footer-bottom" style="background: var(--text-color); color: #fff; padding: 2rem; border-top: var(--border-width) solid var(--border-color);">
            &copy; 2026 Portfolio Sample Admin. SYSTEM SECURE.
        </div>
    </footer>
</div>

<script src="app.js"></script>
<script>
(function () {
    const AUTH_KEY = 'portfolioAdminAuth';
    const CAT_KEY = 'portfolioProductsCatalog';

    function showLogin() {
        document.getElementById('admin-login-wrap').style.display = '';
        document.getElementById('admin-dash-wrap').style.display = 'none';
        document.getElementById('admin-body').style.backgroundColor = 'var(--accent-2)';
    }

    function showDash() {
        document.getElementById('admin-login-wrap').style.display = 'none';
        document.getElementById('admin-dash-wrap').style.display = '';
        document.getElementById('admin-body').style.backgroundColor = 'var(--bg-color)';
    }

    async function getCatalog() {
        const raw = localStorage.getItem(CAT_KEY);
        if (raw) {
            try { return JSON.parse(raw); } catch (e) {}
        }
        const r = await fetch('products.json');
        const j = await r.json();
        return Array.isArray(j) ? j : [];
    }

    function saveCatalog(products) {
        localStorage.setItem(CAT_KEY, JSON.stringify(products));
    }

    async function renderList() {
        const el = document.getElementById('admin-product-list');
        const products = await getCatalog();
        if (!products.length) {
            el.innerHTML = '<p style="padding: 1rem; font-weight: bold;">No products yet.</p>';
            return;
        }
        el.innerHTML = products.map((p) => (
            '<div style="display: flex; justify-content: space-between; align-items: center; padding: 1rem; border-bottom: 2px dashed var(--border-color); background: #fff; margin-bottom: 0.5rem; border: 2px solid var(--border-color);">' +
            '<div><strong style="display:block;">' + escapeHtml(p.title) + '</strong>' +
            '<span style="font-size:0.8rem; color: #555;">ID: ' + escapeHtml(String(p.id)) + '</span></div>' +
            '<button type="button" class="btn btn-secondary admin-del" data-id="' + escapeHtml(String(p.id)) + '" style="padding: 0.5rem 1rem; font-size: 0.8rem; background: #ff4d4d; color: #fff;">DELETE</button></div>'
        )).join('');
        el.querySelectorAll('.admin-del').forEach((btn) => {
            btn.addEventListener('click', async () => {
                if (!confirm('Delete this item?')) return;
                const id = btn.getAttribute('data-id');
                let products = await getCatalog();
                products = products.filter((x) => String(x.id) !== String(id));
                saveCatalog(products);
                renderList();
                if (typeof window.showToast === 'function') window.showToast('Product removed (this browser).', 'success');
            });
        });
    }

    function escapeHtml(s) {
        const d = document.createElement('div');
        d.textContent = s;
        return d.innerHTML;
    }

    document.getElementById('admin-login-form').addEventListener('submit', (e) => {
        e.preventDefault();
        const u = document.getElementById('username').value.trim();
        const p = document.getElementById('password').value;
        const err = document.getElementById('login-error');
        if (u === 'user' && p === 'user') {
            sessionStorage.setItem(AUTH_KEY, '1');
            err.style.display = 'none';
            showDash();
            renderList();
        } else {
            err.style.display = 'block';
            err.textContent = 'INVALID CREDENTIALS';
        }
    });

    document.getElementById('admin-logout').addEventListener('click', (e) => {
        e.preventDefault();
        sessionStorage.removeItem(AUTH_KEY);
        showLogin();
    });

    document.getElementById('add-product-form').addEventListener('submit', (e) => {
        e.preventDefault();
        const title = document.getElementById('new-title').value.trim();
        const price = document.getElementById('new-price').value;
        const description = document.getElementById('new-desc').value.trim();
        const fileInput = document.getElementById('new-image');
        if (!fileInput.files.length) return;

        const reader = new FileReader();
        reader.onload = async function () {
            const products = await getCatalog();
            products.push({
                id: 'local_' + Date.now().toString(36),
                title,
                price: String(price),
                description,
                image: reader.result
            });
            saveCatalog(products);
            document.getElementById('add-product-form').reset();
            renderList();
            if (typeof window.showToast === 'function') window.showToast('Product added (saved in this browser).', 'success');
        };
        reader.readAsDataURL(fileInput.files[0]);
    });

    document.getElementById('discount-form').addEventListener('submit', (e) => {
        e.preventDefault();
        alert('Code Generated! (demo)');
    });

    document.getElementById('admin-diagnostics').addEventListener('click', () => {
        alert('Static demo OK. Products in localStorage: ' + (localStorage.getItem(CAT_KEY) ? 'yes' : 'using default from products.json'));
    });

    if (sessionStorage.getItem(AUTH_KEY) === '1') {
        showDash();
        renderList();
    } else {
        showLogin();
    }
})();
</script>
</body>
</html>
